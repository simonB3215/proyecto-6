name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *' # Ejecutar todos los días a las 3:00 AM UTC
  workflow_dispatch: # Permite ejecución manual desde GitHub Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente de PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Crear volcado de la base de datos
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          BACKUP_FILE="backup_$TIMESTAMP.sql"
          pg_dump "$DATABASE_URL" > $BACKUP_FILE
          gzip $BACKUP_FILE
          echo "BACKUP_NAME=$BACKUP_FILE.gz" >> $GITHUB_ENV

      - name: Subir a Cloudflare R2 / Backblaze B2 (S3 API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws s3 cp ${{ env.BACKUP_NAME }} s3://$S3_BUCKET/${{ env.BACKUP_NAME }} --endpoint-url $S3_ENDPOINT
